<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>🚭 戒烟打卡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f1a;
            --bg-card: #111827;
            --bg-card-hover: #1a2235;
            --accent-green: #22c55e;
            --accent-green-dim: rgba(34, 197, 94, 0.12);
            --accent-blue: #3b82f6;
            --accent-blue-dim: rgba(59, 130, 246, 0.12);
            --accent-orange: #f59e0b;
            --accent-orange-dim: rgba(245, 158, 11, 0.12);
            --accent-red: #ef4444;
            --accent-red-dim: rgba(239, 68, 68, 0.12);
            --accent-purple: #a855f7;
            --accent-purple-dim: rgba(168, 85, 247, 0.12);
            --accent-cyan: #06b6d4;
            --accent-cyan-dim: rgba(6, 182, 212, 0.12);
            --accent-pink: #ec4899;
            --accent-pink-dim: rgba(236, 72, 153, 0.12);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { font-size: 16px; }
        @media (max-width: 375px) { html { font-size: 14px; } }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ===== 顶部状态栏 ===== */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px 8px;
            background: linear-gradient(180deg, rgba(34,197,94,0.08), transparent);
        }
        .status-bar .title {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-bar .date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ===== 打卡大按钮 ===== */
        .checkin-section {
            padding: 16px;
            text-align: center;
        }
        .checkin-btn {
            width: 100%;
            max-width: 320px;
            margin: 0 auto;
            padding: 18px 24px;
            border-radius: 20px;
            border: none;
            font-size: 1.15rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .checkin-btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            box-shadow: 0 4px 24px rgba(34,197,94,0.35);
        }
        .checkin-btn-primary:active {
            transform: scale(0.97);
            box-shadow: 0 2px 12px rgba(34,197,94,0.25);
        }
        .checkin-btn-primary.checked {
            background: linear-gradient(135deg, #15803d, #166534);
            box-shadow: none;
        }
        .checkin-btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* ===== 省钱卡片 ===== */
        .savings-card {
            margin: 0 16px 16px;
            background: linear-gradient(135deg, rgba(236,72,153,0.1), rgba(168,85,247,0.1));
            border: 1px solid rgba(236,72,153,0.2);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .savings-card::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle, rgba(236,72,153,0.08) 0%, transparent 60%);
            animation: pulse 5s ease-in-out infinite;
        }
        .savings-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            position: relative;
        }
        .savings-amount {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            line-height: 1.1;
        }
        .savings-amount .currency { font-size: 1.5rem; font-weight: 500; }
        .savings-detail {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            position: relative;
        }
        .savings-detail-item {
            text-align: center;
            flex: 1;
        }
        .savings-detail-item .value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-pink);
        }
        .savings-detail-item .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ===== 恢复度圆环 ===== */
        .recovery-section {
            margin: 0 16px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 20px;
            text-align: center;
        }
        .recovery-circle-wrap {
            width: 160px;
            height: 160px;
            margin: 0 auto 16px;
            position: relative;
        }
        .recovery-circle-wrap svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        .recovery-circle-wrap .bg-circle {
            fill: none;
            stroke: rgba(255,255,255,0.06);
            stroke-width: 10;
        }
        .recovery-circle-wrap .progress-circle {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .recovery-value {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--accent-green);
        }
        .recovery-value span { font-size: 1rem; color: var(--text-secondary); }
        .recovery-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .stage-badge {
            display: inline-block;
            background: var(--accent-green-dim);
            color: var(--accent-green);
            padding: 5px 16px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(34,197,94,0.2);
        }

        /* ===== 信息网格 ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 0 16px 16px;
        }
        .info-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 8px;
            text-align: center;
        }
        .info-item .icon { font-size: 1.3rem; margin-bottom: 6px; }
        .info-item .value { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
        .info-item .label { font-size: 0.65rem; color: var(--text-muted); }

        /* ===== 系统恢复 ===== */
        .section {
            margin: 0 16px 16px;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .system-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .system-card::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
        }
        .system-card.green::after { background: var(--accent-green); }
        .system-card.blue::after { background: var(--accent-blue); }
        .system-card.orange::after { background: var(--accent-orange); }
        .system-card.red::after { background: var(--accent-red); }
        .system-card.purple::after { background: var(--accent-purple); }
        .system-card.cyan::after { background: var(--accent-cyan); }

        .system-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .system-card.green .system-icon { background: var(--accent-green-dim); }
        .system-card.blue .system-icon { background: var(--accent-blue-dim); }
        .system-card.orange .system-icon { background: var(--accent-orange-dim); }
        .system-card.red .system-icon { background: var(--accent-red-dim); }
        .system-card.purple .system-icon { background: var(--accent-purple-dim); }
        .system-card.cyan .system-icon { background: var(--accent-cyan-dim); }

        .system-info { flex: 1; min-width: 0; }
        .system-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; }
        .system-desc { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .system-percent { font-weight: 700; font-size: 1rem; flex-shrink: 0; }
        .system-card.green .system-percent { color: var(--accent-green); }
        .system-card.blue .system-percent { color: var(--accent-blue); }
        .system-card.orange .system-percent { color: var(--accent-orange); }
        .system-card.red .system-percent { color: var(--accent-red); }
        .system-card.purple .system-percent { color: var(--accent-purple); }
        .system-card.cyan .system-percent { color: var(--accent-cyan); }

        .progress-mini {
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-mini-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1.5s ease-out;
        }
        .system-card.green .progress-mini-fill { background: var(--accent-green); }
        .system-card.blue .progress-mini-fill { background: var(--accent-blue); }
        .system-card.orange .progress-mini-fill { background: var(--accent-orange); }
        .system-card.red .progress-mini-fill { background: var(--accent-red); }
        .system-card.purple .progress-mini-fill { background: var(--accent-purple); }
        .system-card.cyan .progress-mini-fill { background: var(--accent-cyan); }

        /* ===== 里程碑 ===== */
        .timeline {
            position: relative;
            padding-left: 24px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 7px; top: 0; bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-green), var(--accent-blue));
        }
        .timeline-item {
            position: relative;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-dot {
            position: absolute;
            left: -20px; top: 14px;
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            z-index: 2;
        }
        .timeline-item.done .timeline-dot { background: var(--accent-green); box-shadow: 0 0 8px rgba(34,197,94,0.4); }
        .timeline-item.pending .timeline-dot { background: var(--border); }
        .timeline-item.upcoming .timeline-dot { background: var(--accent-blue); animation: blink 2s infinite; }
        .timeline-time { font-size: 0.8rem; font-weight: 600; margin-bottom: 2px; }
        .timeline-item.done .timeline-time { color: var(--accent-green); }
        .timeline-item.pending .timeline-time { color: var(--text-muted); }
        .timeline-item.upcoming .timeline-time { color: var(--accent-blue); }
        .timeline-desc { font-size: 0.78rem; color: var(--text-secondary); }
        .timeline-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 8px;
            font-size: 0.65rem;
            margin-left: 6px;
            font-weight: 500;
        }
        .timeline-item.done .timeline-badge { background: var(--accent-green-dim); color: var(--accent-green); }
        .timeline-item.pending .timeline-badge { background: rgba(100,116,139,0.15); color: var(--text-muted); }
        .timeline-item.upcoming .timeline-badge { background: var(--accent-blue-dim); color: var(--accent-blue); }

        /* ===== 预测 ===== */
        .prediction-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(168,85,247,0.08));
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 16px;
            padding: 16px;
        }
        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .prediction-item:last-child { border-bottom: none; }
        .prediction-name { font-size: 0.85rem; color: var(--text-secondary); }
        .prediction-values { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; }
        .prediction-current { color: var(--text-muted); text-decoration: line-through; font-size: 0.8rem; }
        .prediction-arrow { color: var(--accent-blue); font-size: 0.8rem; }
        .prediction-future { color: var(--accent-green); font-weight: 700; }
        .prediction-gain { font-size: 0.75rem; color: var(--accent-green); margin-left: 4px; }

        /* ===== 建议 ===== */
        .tip-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 10px;
        }
        .tip-card:last-child { margin-bottom: 0; }
        .tip-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; color: var(--text-primary); }
        .tip-desc { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.6; }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            padding: 30px 16px 40px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .footer .encourage {
            font-size: 0.95rem;
            color: var(--accent-green);
            font-weight: 600;
            margin-bottom: 6px;
        }

        /* ===== 配置面板（底部弹窗） ===== */
        .config-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .config-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .config-sheet {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: var(--bg-card);
            border-radius: 24px 24px 0 0;
            padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .config-sheet.show {
            transform: translateY(0);
        }
        .config-sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .config-sheet-title {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .config-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--bg-card-hover);
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .config-group.full-width {
            grid-column: 1 / -1;
        }
        .config-group label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .config-group input, .config-group select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .config-group input:focus, .config-group select:focus {
            border-color: var(--accent-green);
        }
        .config-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
        }
        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-danger {
            background: var(--accent-red-dim);
            color: var(--accent-red);
            border: 1px solid rgba(239,68,68,0.2);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 8px 32px rgba(34,197,94,0.4);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            white-space: nowrap;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <!-- 配置面板遮罩 -->
    <div class="config-overlay" id="configOverlay" onclick="closeConfig()"></div>
    <div class="config-sheet" id="configSheet">
        <div class="config-sheet-header">
            <div class="config-sheet-title">⚙️ 参数配置</div>
            <button class="config-close" onclick="closeConfig()">✕</button>
        </div>
        <div class="config-grid">
            <div class="config-group">
                <label>年龄</label>
                <input type="number" id="cfgAge" value="31" min="18" max="100" inputmode="numeric">
            </div>
            <div class="config-group">
                <label>性别</label>
                <select id="cfgGender">
                    <option value="男" selected>男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="config-group">
                <label>烟龄（年）</label>
                <input type="number" id="cfgYears" value="5" min="0" max="60" inputmode="numeric">
            </div>
            <div class="config-group">
                <label>日均吸烟量（支）</label>
                <input type="number" id="cfgDaily" value="15" min="0" max="100" inputmode="numeric">
            </div>
            <div class="config-group">
                <label>已戒烟时长（天）</label>
                <input type="number" id="cfgQuitDays" value="14" min="0" max="6000" inputmode="numeric">
            </div>
            <div class="config-group">
                <label>每天烟钱（元）</label>
                <input type="number" id="cfgCost" value="25" min="0" max="500" step="0.5" inputmode="decimal">
            </div>
            <div class="config-group full-width">
                <label>基础疾病</label>
                <select id="cfgDisease">
                    <option value="none" selected>无</option>
                    <option value="hypertension">高血压</option>
                    <option value="copd">慢性支气管炎/COPD</option>
                    <option value="asthma">哮喘</option>
                    <option value="diabetes">糖尿病</option>
                    <option value="heart">心脏病</option>
                </select>
            </div>
        </div>
        <div class="config-actions">
            <button class="btn btn-primary" onclick="saveAndGenerate()">💾 保存</button>
            <button class="btn btn-secondary" onclick="resetConfig()">重置</button>
        </div>
        <div style="margin-top: 10px;">
            <button class="btn btn-danger" style="width:100%" onclick="clearAllData()">🗑️ 清除所有数据</button>
        </div>
    </div>

    <!-- 主内容 -->
    <div class="status-bar">
        <div class="title">🚭 戒烟打卡</div>
        <div class="date" id="currentDate"></div>
    </div>

    <div class="checkin-section">
        <button class="checkin-btn checkin-btn-primary" id="checkinBtn" onclick="doCheckin(event)">
            <span id="checkinIcon">👆</span>
            <span id="checkinText">点击打卡</span>
        </button>
    </div>

    <div class="savings-card">
        <div class="savings-label">💰 累计节省金额</div>
        <div class="savings-amount"><span class="currency">¥</span><span id="savingsNumber">0</span></div>
        <div class="savings-detail">
            <div class="savings-detail-item">
                <div class="value" id="dailyCost">¥0</div>
                <div class="label">每天烟钱</div>
            </div>
            <div class="savings-detail-item">
                <div class="value" id="totalDays">0天</div>
                <div class="label">已坚持</div>
            </div>
            <div class="savings-detail-item">
                <div class="value" id="totalCigarettesSaved">0支</div>
                <div class="label">少吸了</div>
            </div>
        </div>
    </div>

    <div class="recovery-section">
        <svg width="0" height="0">
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#22c55e"/>
                    <stop offset="100%" style="stop-color:#06b6d4"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="recovery-circle-wrap">
            <svg viewBox="0 0 160 160">
                <circle class="bg-circle" cx="80" cy="80" r="70"/>
                <circle class="progress-circle" cx="80" cy="80" r="70" id="progressCircle"/>
            </svg>
            <div class="recovery-value">
                <span id="recoveryNumber">0</span><span>%</span>
            </div>
        </div>
        <div class="recovery-label">综合健康恢复度</div>
        <div class="stage-badge" id="stageBadge">加载中...</div>
    </div>

    <div class="info-grid" id="infoGrid"></div>

    <div class="section">
        <div class="section-title">📊 各系统恢复</div>
        <div id="systemsContainer"></div>
    </div>

    <div class="section">
        <div class="section-title">🔮 30天预测</div>
        <div class="prediction-card" id="predictionContainer"></div>
    </div>

    <div class="section">
        <div class="section-title">🎯 恢复里程碑</div>
        <div class="timeline" id="timelineContainer"></div>
    </div>

    <div class="section">
        <div class="section-title">💡 专属建议</div>
        <div id="tipsContainer"></div>
    </div>

    <div class="footer">
        <div class="encourage" id="footerEncourage">坚持就是胜利！</div>
        <div>数据保存在本地浏览器 · 仅供参考</div>
    </div>

    <script>
        // ========== 存储（兼容微信 + 降级） ==========
        const STORAGE_KEY = 'quit_smoking_tracker_v2';
        const CHECKIN_KEY = 'quit_smoking_checkins_v2';
        let memoryStore = null;

        function canUseStorage() {
            try {
                const test = '__test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch(e) {
                return false;
            }
        }

        const storageOK = canUseStorage();

        function loadData() {
            if (storageOK) {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) return JSON.parse(saved);
                } catch(e) {}
            }
            if (memoryStore) return memoryStore;
            return null;
        }

        function saveData(data) {
            if (storageOK) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                } catch(e) {
                    memoryStore = data;
                }
            } else {
                memoryStore = data;
            }
        }

        function loadCheckins() {
            if (storageOK) {
                try {
                    const saved = localStorage.getItem(CHECKIN_KEY);
                    if (saved) return JSON.parse(saved);
                } catch(e) {}
            }
            return [];
        }

        function saveCheckins(checkins) {
            if (storageOK) {
                try {
                    localStorage.setItem(CHECKIN_KEY, JSON.stringify(checkins));
                } catch(e) {}
            }
        }

        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function isCheckedInToday() {
            const checkins = loadCheckins();
            return checkins.includes(getTodayStr());
        }

        // ========== 配置管理 ==========
        const DEFAULT_CONFIG = {
            age: 31, gender: '男', years: 5, daily: 15, quitDays: 14,
            cost: 25, disease: 'none'
        };

        function openConfig() {
            document.getElementById('configOverlay').classList.add('show');
            document.getElementById('configSheet').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeConfig() {
            document.getElementById('configOverlay').classList.remove('show');
            document.getElementById('configSheet').classList.remove('show');
            document.body.style.overflow = '';
        }

        function getConfig() {
            return {
                age: parseInt(document.getElementById('cfgAge').value) || 31,
                gender: document.getElementById('cfgGender').value,
                years: parseInt(document.getElementById('cfgYears').value) || 0,
                daily: parseInt(document.getElementById('cfgDaily').value) || 0,
                quitDays: parseInt(document.getElementById('cfgQuitDays').value) || 0,
                cost: parseFloat(document.getElementById('cfgCost').value) || 0,
                disease: document.getElementById('cfgDisease').value
            };
        }

        function setConfig(cfg) {
            document.getElementById('cfgAge').value = cfg.age;
            document.getElementById('cfgGender').value = cfg.gender;
            document.getElementById('cfgYears').value = cfg.years;
            document.getElementById('cfgDaily').value = cfg.daily;
            document.getElementById('cfgQuitDays').value = cfg.quitDays;
            document.getElementById('cfgCost').value = cfg.cost;
            document.getElementById('cfgDisease').value = cfg.disease;
        }

        function resetConfig() {
            setConfig(DEFAULT_CONFIG);
            showToast('↩️ 已重置');
        }

        function clearAllData() {
            if (!confirm('确定清除所有数据？')) return;
            if (storageOK) {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(CHECKIN_KEY);
            }
            memoryStore = null;
            resetConfig();
            closeConfig();
            generateReport();
            showToast('🗑️ 已清除');
        }

        function saveAndGenerate() {
            const cfg = getConfig();
            saveData(cfg);
            closeConfig();
            generateReport();
            showToast('💾 已保存');
        }

        // ========== 打卡 ==========
        function doCheckin(event) {
            if (isCheckedInToday()) {
                showToast('✅ 今天已打卡');
                return;
            }

            // 涟漪效果
            if (event) {
                const btn = event.currentTarget;
                const rect = btn.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.left = (event.clientX - rect.left) + 'px';
                ripple.style.top = (event.clientY - rect.top) + 'px';
                btn.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }

            const checkins = loadCheckins();
            checkins.push(getTodayStr());
            saveCheckins(checkins);

            const cfg = getConfig();
            cfg.quitDays += 1;
            document.getElementById('cfgQuitDays').value = cfg.quitDays;
            saveData(cfg);

            updateCheckinBtn();
            generateReport();
            showToast('🎉 打卡成功！+1天');
        }

        function updateCheckinBtn() {
            const btn = document.getElementById('checkinBtn');
            const icon = document.getElementById('checkinIcon');
            const text = document.getElementById('checkinText');
            if (isCheckedInToday()) {
                btn.classList.add('checked');
                icon.textContent = '✅';
                text.textContent = '今日已打卡';
            } else {
                btn.classList.remove('checked');
                icon.textContent = '👆';
                text.textContent = '点击打卡';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ========== 计算引擎 ==========
        function calculateRecovery(cfg) {
            const { age, years, daily, quitDays, cost, disease } = cfg;
            const packYears = (years * daily) / 20;
            const totalCigarettes = years * 365 * daily;
            const savings = quitDays * cost;
            const cigarettesSaved = quitDays * daily;

            let diseaseFactor = 1.0, diseaseLabel = '无';
            switch(disease) {
                case 'hypertension': diseaseFactor = 0.85; diseaseLabel = '高血压'; break;
                case 'copd': diseaseFactor = 0.7; diseaseLabel = 'COPD'; break;
                case 'asthma': diseaseFactor = 0.8; diseaseLabel = '哮喘'; break;
                case 'diabetes': diseaseFactor = 0.88; diseaseLabel = '糖尿病'; break;
                case 'heart': diseaseFactor = 0.75; diseaseLabel = '心脏病'; break;
            }

            const ageFactor = age <= 30 ? 1.1 : age <= 40 ? 1.0 : age <= 50 ? 0.9 : age <= 60 ? 0.8 : 0.7;

            let intensityLabel;
            if (packYears < 5) intensityLabel = '轻度';
            else if (packYears < 15) intensityLabel = '中度';
            else if (packYears < 30) intensityLabel = '重度';
            else intensityLabel = '极重度';

            function calcLung() {
                let base = Math.min(95, (1 - Math.exp(-quitDays / 90)) * 100);
                let early = Math.min(15, quitDays * 0.5);
                return Math.max(0, Math.min(95, (base * 0.8 + early) * ageFactor * diseaseFactor));
            }
            function calcCardio() {
                if (quitDays < 1) return 5;
                let val;
                if (quitDays < 7) val = 15 + quitDays * 2;
                else if (quitDays < 30) val = 25 + (quitDays - 7) * 1.5;
                else if (quitDays < 90) val = 55 + (quitDays - 30) * 0.5;
                else if (quitDays < 365) val = 80 + (quitDays - 90) * 0.1;
                else val = 90 + Math.min(10, (quitDays - 365) * 0.02);
                return Math.min(95, val * ageFactor * diseaseFactor);
            }
            function calcBlood() {
                if (quitDays < 0.5) return 10;
                if (quitDays < 1) return 40;
                if (quitDays < 3) return 65 + (quitDays - 1) * 10;
                if (quitDays < 7) return 85 + (quitDays - 3) * 2;
                return Math.min(100, 93 + quitDays * 0.1);
            }
            function calcResp() {
                let base = Math.min(85, quitDays / 270 * 85);
                if (packYears < 5) base *= 1.15;
                return Math.min(90, base * ageFactor * diseaseFactor);
            }
            function calcCancer() {
                let recovery;
                if (quitDays < 365) recovery = 10 + quitDays / 365 * 15;
                else if (quitDays < 365 * 5) recovery = 25 + (quitDays - 365) / (365 * 4) * 25;
                else if (quitDays < 365 * 10) recovery = 50 + (quitDays - 365 * 5) / (365 * 5) * 25;
                else recovery = 75 + Math.min(20, (quitDays - 365 * 10) / (365 * 5) * 20);
                if (packYears < 5) recovery = Math.min(95, recovery * 1.2);
                return Math.min(95, recovery * ageFactor);
            }
            function calcMeta() {
                if (quitDays < 3) return 20 + quitDays * 10;
                if (quitDays < 14) return 50 + (quitDays - 3) * 3;
                if (quitDays < 30) return 80 + (quitDays - 14) * 0.5;
                return Math.min(97, 87 + quitDays * 0.05);
            }

            const lung = calcLung(), cardio = calcCardio(), blood = calcBlood();
            const resp = calcResp(), cancer = calcCancer(), meta = calcMeta();
            const weights = { lung: 0.20, cardio: 0.20, blood: 0.15, resp: 0.15, cancer: 0.15, meta: 0.15 };
            const total = lung * weights.lung + cardio * weights.cardio + blood * weights.blood +
                          resp * weights.resp + cancer * weights.cancer + meta * weights.meta;

            let stage;
            if (quitDays < 3) stage = '急性戒断期';
            else if (quitDays < 14) stage = '早期恢复期';
            else if (quitDays < 90) stage = '快速修复期';
            else if (quitDays < 365) stage = '稳定恢复期';
            else stage = '长期康复期';

            return {
                age, gender: cfg.gender, years, daily, totalCigarettes, packYears,
                quitDays, cost, savings, cigarettesSaved,
                intensityLabel, diseaseLabel,
                lung, cardio, blood, resp, cancer, meta, total, stage
            };
        }

        // ========== 渲染 ==========
        function renderSavings(data) {
            animateNumber(document.getElementById('savingsNumber'), data.savings, 1200);
            document.getElementById('dailyCost').textContent = `¥${data.cost}`;
            document.getElementById('totalDays').textContent = `${data.quitDays}天`;
            document.getElementById('totalCigarettesSaved').textContent = `${data.cigarettesSaved.toLocaleString()}支`;
        }

        function renderInfoGrid(data) {
            const items = [
                { icon: '📅', value: `${data.years}年`, label: '烟龄' },
                { icon: '🚬', value: `${data.daily}支`, label: '日均' },
                { icon: '📦', value: `${data.packYears.toFixed(1)}`, label: '包年' },
            ];
            document.getElementById('infoGrid').innerHTML = items.map(item => `
                <div class="info-item">
                    <div class="icon">${item.icon}</div>
                    <div class="value">${item.value}</div>
                    <div class="label">${item.label}</div>
                </div>
            `).join('');
        }

        function renderSystems(data) {
            const systems = [
                { name: '血液指标', desc: '一氧化碳已清除', icon: '🩸', color: 'green', percent: data.blood },
                { name: '代谢精力', desc: '睡眠质量提高', icon: '⚡', color: 'cyan', percent: data.meta },
                { name: '心血管', desc: '循环持续改善', icon: '❤️', color: 'blue', percent: data.cardio },
                { name: '肺功能', desc: '进入修复期', icon: '🫁', color: 'orange', percent: data.lung },
                { name: '呼吸道', desc: '纤毛再生中', icon: '🫁', color: 'purple', percent: data.resp },
                { name: '癌症风险', desc: '长期指标', icon: '🛡️', color: 'red', percent: data.cancer },
            ];

            document.getElementById('systemsContainer').innerHTML = systems.map(s => `
                <div class="system-card ${s.color}">
                    <div class="system-icon">${s.icon}</div>
                    <div class="system-info">
                        <div class="system-name">${s.name}</div>
                        <div class="system-desc">${s.desc}</div>
                        <div class="progress-mini">
                            <div class="progress-mini-fill" style="width:0%" data-width="${s.percent.toFixed(1)}"></div>
                        </div>
                    </div>
                    <div class="system-percent">${s.percent.toFixed(1)}%</div>
                </div>
            `).join('');

            setTimeout(() => {
                document.querySelectorAll('.progress-mini-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width') + '%';
                });
            }, 100);
        }

        function renderPrediction(data) {
            const futureDays = data.quitDays + 30;
            const fLung = Math.min(95, (1 - Math.exp(-futureDays / 90)) * 80 + Math.min(15, futureDays * 0.5));
            const fCardio = futureDays < 7 ? 15 + futureDays * 2 : futureDays < 30 ? 25 + (futureDays - 7) * 1.5 :
                           futureDays < 90 ? 55 + (futureDays - 30) * 0.5 : futureDays < 365 ? 80 + (futureDays - 90) * 0.1 :
                           90 + Math.min(10, (futureDays - 365) * 0.02);
            const fMeta = futureDays < 3 ? 20 + futureDays * 10 : futureDays < 14 ? 50 + (futureDays - 3) * 3 :
                         futureDays < 30 ? 80 + (futureDays - 14) * 0.5 : Math.min(97, 87 + futureDays * 0.05);
            const fTotal = fLung * 0.2 + fCardio * 0.2 + 95 * 0.15 + fLung * 0.15 + 15 * 0.15 + fMeta * 0.15;

            const predictions = [
                { name: '综合恢复度', current: data.total, future: fTotal },
                { name: '肺功能', current: data.lung, future: fLung },
                { name: '心血管', current: data.cardio, future: fCardio },
                { name: '代谢精力', current: data.meta, future: fMeta }
            ];

            document.getElementById('predictionContainer').innerHTML = predictions.map(p => {
                const gain = p.future - p.current;
                return `
                <div class="prediction-item">
                    <span class="prediction-name">${p.name}</span>
                    <span class="prediction-values">
                        <span class="prediction-current">${p.current.toFixed(1)}%</span>
                        <span class="prediction-arrow">→</span>
                        <span class="prediction-future">${p.future.toFixed(1)}%</span>
                        <span class="prediction-gain">+${gain.toFixed(1)}%</span>
                    </span>
                </div>
            `}).join('');
        }

        function renderTimeline(data) {
            const milestones = [
                { value: 20, unit: '分钟', desc: '心率血压下降' },
                { value: 12, unit: '小时', desc: 'CO水平正常' },
                { value: 48, unit: '小时', desc: '味觉改善' },
                { value: 72, unit: '小时', desc: '尼古丁清除' },
                { value: 14, unit: '天', desc: '循环改善' },
                { value: 30, unit: '天', desc: '肺功能提升30%' },
                { value: 90, unit: '天', desc: '纤毛再生' },
                { value: 365, unit: '年', desc: '冠心病风险降50%' },
                { value: 5, unit: '年', desc: '中风风险正常' },
                { value: 10, unit: '年', desc: '肺癌风险降50%' },
                { value: 15, unit: '年', desc: '完全恢复' }
            ];

            let currentPassed = false;
            document.getElementById('timelineContainer').innerHTML = milestones.map((m, i) => {
                let days = m.unit === '分钟' ? m.value / 1440 : m.unit === '小时' ? m.value / 24 :
                           m.unit === '年' ? m.value * 365 : m.value;
                let status = data.quitDays >= days ? 'done' : (!currentPassed ? (currentPassed = true, 'upcoming') : 'pending');
                if (status === 'done' && i < milestones.length - 1) {
                    let next = milestones[i + 1];
                    let nd = next.unit === '分钟' ? next.value / 1440 : next.unit === '小时' ? next.value / 24 :
                             next.unit === '年' ? next.value * 365 : next.value;
                    if (data.quitDays < nd) status = 'done current';
                }
                const badge = status === 'done' ? '已达成' : status.includes('current') ? '当前' :
                              status === 'upcoming' ? '即将' : '未达成';
                return `
                <div class="timeline-item ${status.replace(' current', '')}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-time">${m.value}${m.unit} <span class="timeline-badge">${badge}</span></div>
                    <div class="timeline-desc">${m.desc}</div>
                </div>
            `}).join('');
        }

        function renderTips(data) {
            const tips = [];
            if (data.quitDays < 30) tips.push({ title: '抓住第14-30天窗口期', desc: '肺功能正在快速修复，这是回报最明显的阶段。' });
            if (data.packYears < 5) tips.push({ title: '轻度损伤，恢复优势明显', desc: `${data.packYears.toFixed(1)}包年属于轻度，修复速度比重度快30%以上。` });
            tips.push({ title: '开始适度运动', desc: '快走或慢跑能加速恢复，戒烟后运动耐受性会快速提升。' });
            if (data.quitDays < 30) tips.push({ title: '警惕"就一口"陷阱', desc: '2-4周是复吸高发期，一口就能重启多巴胺回路。' });
            tips.push({ title: `已省¥${data.savings.toFixed(0)}，奖励自己`, desc: `每天省¥${data.cost}，用这笔钱买想要的东西！` });

            document.getElementById('tipsContainer').innerHTML = tips.map(tip => `
                <div class="tip-card">
                    <div class="tip-title">${tip.title}</div>
                    <div class="tip-desc">${tip.desc}</div>
                </div>
            `).join('');
        }

        function animateNumber(element, target, duration = 1200) {
            const startVal = parseFloat(element.textContent.replace(/,/g, '')) || 0;
            const diff = target - startVal;
            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                element.textContent = Math.round(startVal + diff * ease).toLocaleString('zh-CN');
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function animateCircle(target) {
            const circle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 70;
            const offset = circumference - (target / 100) * circumference;
            setTimeout(() => { circle.style.strokeDashoffset = offset; }, 300);
        }

        // ========== 主生成 ==========
        function generateReport() {
            const cfg = getConfig();
            const data = calculateRecovery(cfg);

            document.getElementById('stageBadge').textContent = `${data.stage} · 第${data.quitDays}天`;
            document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });

            renderSavings(data);
            renderInfoGrid(data);
            renderSystems(data);
            renderPrediction(data);
            renderTimeline(data);
            renderTips(data);

            const encourage = data.total < 30 ? '刚开始，你已迈出最重要的一步！' :
                             data.total < 50 ? '恢复加速中，坚持就是胜利！' :
                             data.total < 70 ? '身体正在感谢你，继续加油！' :
                             data.total < 85 ? '大部分已恢复，保持势头！' : '几乎完全恢复，太棒了！';
            document.getElementById('footerEncourage').textContent = encourage;

            animateNumber(document.getElementById('recoveryNumber'), data.total);
            animateCircle(data.total);
        }

        // ========== 初始化 ==========
        function init() {
            const saved = loadData();
            if (saved) setConfig(saved);
            updateCheckinBtn();
            generateReport();

            // 长按标题打开配置
            const title = document.querySelector('.status-bar .title');
            let pressTimer;
            title.addEventListener('touchstart', () => { pressTimer = setTimeout(openConfig, 800); });
            title.addEventListener('touchend', () => { clearTimeout(pressTimer); });
            title.addEventListener('touchmove', () => { clearTimeout(pressTimer); });
            title.addEventListener('click', () => { clearTimeout(pressTimer); openConfig(); });
        }

        window.addEventListener('load', init);
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚭 戒烟健康恢复追踪 - 打卡版</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #27354f;
            --accent-green: #22c55e;
            --accent-green-dim: rgba(34, 197, 94, 0.15);
            --accent-blue: #3b82f6;
            --accent-blue-dim: rgba(59, 130, 246, 0.15);
            --accent-orange: #f59e0b;
            --accent-orange-dim: rgba(245, 158, 11, 0.15);
            --accent-red: #ef4444;
            --accent-red-dim: rgba(239, 68, 68, 0.15);
            --accent-purple: #a855f7;
            --accent-purple-dim: rgba(168, 85, 247, 0.15);
            --accent-cyan: #06b6d4;
            --accent-cyan-dim: rgba(6, 182, 212, 0.15);
            --accent-pink: #ec4899;
            --accent-pink-dim: rgba(236, 72, 153, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: var(--accent-green); border-radius: 50%;
            opacity: 0.3; animation: float 15s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 900px; margin: 0 auto;
            padding: 40px 20px; position: relative; z-index: 1;
        }

        /* ===== 打卡按钮 ===== */
        .checkin-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease-out;
        }
        .checkin-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 16px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .checkin-btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            box-shadow: 0 4px 20px rgba(34,197,94,0.3);
        }
        .checkin-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(34,197,94,0.4);
        }
        .checkin-btn-primary:active {
            transform: translateY(0);
        }
        .checkin-btn-primary.checked {
            background: linear-gradient(135deg, #15803d, #166534);
            cursor: default;
        }
        .checkin-btn-secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .checkin-btn-secondary:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        /* ===== 节省金额大卡片 ===== */
        .savings-hero {
            background: linear-gradient(135deg, rgba(236,72,153,0.15), rgba(168,85,247,0.15));
            border: 1px solid rgba(236,72,153,0.3);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.1s both;
        }
        .savings-hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        .savings-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            position: relative;
        }
        .savings-amount {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            line-height: 1.2;
        }
        .savings-amount span {
            font-size: 1.5rem;
            font-weight: 500;
        }
        .savings-detail {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            position: relative;
        }
        .savings-detail-item {
            text-align: center;
        }
        .savings-detail-item .value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-pink);
        }
        .savings-detail-item .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* ===== 配置面板 ===== */
        .config-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            animation: fadeInDown 0.6s ease-out;
        }
        .config-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            cursor: pointer;
            user-select: none;
        }
        .config-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .config-toggle {
            font-size: 1.2rem;
            transition: transform 0.3s;
            color: var(--text-muted);
        }
        .config-toggle.open { transform: rotate(180deg); }
        .config-body {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            max-height: 600px;
            opacity: 1;
        }
        .config-body.collapsed {
            max-height: 0;
            opacity: 0;
        }
        .config-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .config-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .config-group input, .config-group select {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .config-group input:focus, .config-group select:focus {
            border-color: var(--accent-green);
        }
        .config-group input::placeholder {
            color: var(--text-muted);
        }
        .config-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(34,197,94,0.3);
        }
        .btn-secondary {
            background: var(--bg-card-hover);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }
        .btn-danger {
            background: var(--accent-red-dim);
            color: var(--accent-red);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-danger:hover {
            background: rgba(239,68,68,0.25);
        }

        /* ===== 主内容 ===== */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }
        .header h1 {
            font-size: 2.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .header .subtitle { color: var(--text-secondary); font-size: 1rem; }

        .main-card {
            background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(6,182,212,0.1));
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 24px; padding: 40px;
            text-align: center; margin-bottom: 30px;
            position: relative; overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        .main-card::before {
            content: ''; position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .recovery-circle { width: 200px; height: 200px; margin: 0 auto 20px; position: relative; }
        .recovery-circle svg { transform: rotate(-90deg); }
        .recovery-circle .bg-circle { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 12; }
        .recovery-circle .progress-circle {
            fill: none; stroke: url(#gradient); stroke-width: 12;
            stroke-linecap: round; stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48; transition: stroke-dashoffset 2s ease-out;
        }
        .recovery-value {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem; font-weight: 900; color: var(--accent-green);
        }
        .recovery-value span { font-size: 1.2rem; color: var(--text-secondary); }
        .main-card .label { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px; }
        .main-card .stage-badge {
            display: inline-block; background: rgba(34,197,94,0.2);
            color: var(--accent-green); padding: 6px 20px;
            border-radius: 20px; font-size: 0.9rem; font-weight: 500;
            border: 1px solid rgba(34,197,94,0.3);
        }

        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }
        .info-item {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; transition: all 0.3s ease;
        }
        .info-item:hover {
            background: var(--bg-card-hover); transform: translateY(-2px);
            border-color: var(--accent-green);
        }
        .info-item .icon { font-size: 1.5rem; margin-bottom: 8px; }
        .info-item .value { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
        .info-item .label { font-size: 0.85rem; color: var(--text-muted); }

        .systems-section { margin-bottom: 30px; animation: fadeInUp 0.8s ease-out 0.4s both; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .system-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px;
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .system-card::after {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 4px; border-radius: 4px 0 0 4px;
        }
        .system-card:hover { transform: translateX(4px); border-color: var(--border); }
        .system-card.green::after { background: var(--accent-green); }
        .system-card.blue::after { background: var(--accent-blue); }
        .system-card.orange::after { background: var(--accent-orange); }
        .system-card.red::after { background: var(--accent-red); }
        .system-card.purple::after { background: var(--accent-purple); }
        .system-card.cyan::after { background: var(--accent-cyan); }

        .system-icon {
            width: 48px; height: 48px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }
        .system-card.green .system-icon { background: var(--accent-green-dim); }
        .system-card.blue .system-icon { background: var(--accent-blue-dim); }
        .system-card.orange .system-icon { background: var(--accent-orange-dim); }
        .system-card.red .system-icon { background: var(--accent-red-dim); }
        .system-card.purple .system-icon { background: var(--accent-purple-dim); }
        .system-card.cyan .system-icon { background: var(--accent-cyan-dim); }

        .system-info { flex: 1; }
        .system-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
        .system-desc { font-size: 0.8rem; color: var(--text-muted); }
        .system-progress { width: 120px; flex-shrink: 0; }
        .progress-bar-bg { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
        .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 2s ease-out; position: relative; }
        .progress-bar-fill::after {
            content: ''; position: absolute; top: 0; right: 0; bottom: 0;
            width: 20px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
            border-radius: 0 4px 4px 0;
        }
        .system-percent { text-align: right; font-weight: 700; font-size: 1.1rem; }
        .system-card.green .progress-bar-fill { background: linear-gradient(90deg, #16a34a, #22c55e); }
        .system-card.blue .progress-bar-fill { background: linear-gradient(90deg, #2563eb, #3b82f6); }
        .system-card.orange .progress-bar-fill { background: linear-gradient(90deg, #d97706, #f59e0b); }
        .system-card.red .progress-bar-fill { background: linear-gradient(90deg, #dc2626, #ef4444); }
        .system-card.purple .progress-bar-fill { background: linear-gradient(90deg, #9333ea, #a855f7); }
        .system-card.cyan .progress-bar-fill { background: linear-gradient(90deg, #0891b2, #06b6d4); }

        .prediction-section {
            background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(168,85,247,0.1));
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 20px; padding: 30px; margin-bottom: 30px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        .prediction-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .prediction-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .prediction-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 16px; }
        .prediction-name { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
        .prediction-values { display: flex; align-items: center; gap: 8px; font-size: 1.1rem; }
        .prediction-current { color: var(--text-muted); text-decoration: line-through; }
        .prediction-arrow { color: var(--accent-blue); }
        .prediction-future { color: var(--accent-green); font-weight: 700; }
        .prediction-gain { font-size: 0.85rem; color: var(--accent-green); margin-top: 4px; }

        .timeline-section { margin-bottom: 30px; animation: fadeInUp 0.8s ease-out 0.5s both; }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before {
            content: ''; position: absolute; left: 10px; top: 0; bottom: 0;
            width: 2px; background: linear-gradient(180deg, var(--accent-green), var(--accent-blue));
        }
        .timeline-item { position: relative; padding: 16px 0; border-bottom: 1px solid var(--border); }
        .timeline-item:last-child { border-bottom: none; }
        .timeline-dot {
            position: absolute; left: -25px; top: 20px;
            width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid var(--bg-dark); z-index: 2;
        }
        .timeline-item.done .timeline-dot { background: var(--accent-green); box-shadow: 0 0 10px rgba(34,197,94,0.5); }
        .timeline-item.pending .timeline-dot { background: var(--border); }
        .timeline-item.upcoming .timeline-dot { background: var(--accent-blue); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .timeline-time { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
        .timeline-item.done .timeline-time { color: var(--accent-green); }
        .timeline-item.pending .timeline-time { color: var(--text-muted); }
        .timeline-item.upcoming .timeline-time { color: var(--accent-blue); }
        .timeline-desc { font-size: 0.9rem; color: var(--text-secondary); }
        .timeline-badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 0.75rem; margin-left: 8px; font-weight: 500;
        }
        .timeline-item.done .timeline-badge { background: var(--accent-green-dim); color: var(--accent-green); }
        .timeline-item.pending .timeline-badge { background: rgba(100,116,139,0.2); color: var(--text-muted); }
        .timeline-item.upcoming .timeline-badge { background: var(--accent-blue-dim); color: var(--accent-blue); }

        .tips-section { animation: fadeInUp 0.8s ease-out 0.7s both; }
        .tips-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .tip-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; transition: all 0.3s ease;
        }
        .tip-card:hover { border-color: var(--accent-green); transform: translateY(-2px); }
        .tip-number {
            width: 32px; height: 32px; background: var(--accent-green-dim);
            color: var(--accent-green); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; margin-bottom: 12px;
        }
        .tip-title { font-weight: 600; font-size: 1rem; margin-bottom: 8px; }
        .tip-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

        .footer { text-align: center; padding: 40px 0 20px; color: var(--text-muted); font-size: 0.85rem; animation: fadeInUp 0.8s ease-out 0.8s both; }
        .footer .encourage { font-size: 1.1rem; color: var(--accent-green); font-weight: 600; margin-bottom: 8px; }

        /* 打卡成功弹窗 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, var(--accent-green), #16a34a);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            box-shadow: 0 10px 40px rgba(34,197,94,0.4);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .recovery-value { font-size: 2.5rem; }
            .recovery-circle { width: 160px; height: 160px; }
            .system-card { flex-wrap: wrap; }
            .system-progress { width: 100%; margin-top: 10px; }
            .config-actions { flex-direction: column; }
            .savings-amount { font-size: 2.5rem; }
            .checkin-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="toast" id="toast"></div>

    <div class="container">
        <!-- ===== 打卡栏 ===== -->
        <div class="checkin-bar">
            <button class="checkin-btn checkin-btn-primary" id="checkinBtn" onclick="doCheckin()">
                <span id="checkinIcon">✅</span>
                <span id="checkinText">今日已打卡</span>
            </button>
            <button class="checkin-btn checkin-btn-secondary" onclick="toggleConfig()">
                ⚙️ 修改参数
            </button>
        </div>

        <!-- ===== 节省金额大卡片 ===== -->
        <div class="savings-hero">
            <div class="savings-label">💰 累计节省金额</div>
            <div class="savings-amount" id="savingsAmount">¥<span id="savingsNumber">0</span></div>
            <div class="savings-detail">
                <div class="savings-detail-item">
                    <div class="value" id="dailyCost">¥0</div>
                    <div class="label">每天烟钱</div>
                </div>
                <div class="savings-detail-item">
                    <div class="value" id="totalDays">0天</div>
                    <div class="label">已坚持</div>
                </div>
                <div class="savings-detail-item">
                    <div class="value" id="totalCigarettesSaved">0支</div>
                    <div class="label">少吸了</div>
                </div>
            </div>
        </div>

        <!-- ===== 配置面板 ===== -->
        <div class="config-panel">
            <div class="config-header" onclick="toggleConfig()">
                <div class="config-title">⚙️ 参数配置</div>
                <div class="config-toggle open" id="configToggle">▼</div>
            </div>
            <div class="config-body" id="configBody">
                <div class="config-group">
                    <label>年龄</label>
                    <input type="number" id="cfgAge" value="31" min="18" max="100">
                </div>
                <div class="config-group">
                    <label>性别</label>
                    <select id="cfgGender">
                        <option value="男" selected>男</option>
                        <option value="女">女</option>

        <!-- ===== 主内容 ===== -->
        <div class="header">
            <h1>🚭 戒烟健康恢复追踪</h1>

        </div>
    </div>

    <script>
        // ========== 本地存储管理 ==========
        const STORAGE_KEY = 'quit_smoking_tracker_v1';
        const CHECKIN_KEY = 'quit_smoking_checkins';

        const DEFAULT_CONFIG = {
            age: 31, gender: '男', years: 5, daily: 15, quitDays: 14,
            cost: 25, disease: 'none'
        };

        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return null;
        }

        function saveData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch(e) {
                showToast('⚠️ 保存失败，浏览器可能禁用了本地存储');
            }
        }

        function loadCheckins() {
            try {
                const saved = localStorage.getItem(CHECKIN_KEY);
                if (saved) return JSON.parse(saved);
            } catch(e) {}
            return [];
        }

        function saveCheckins(checkins) {
            try {
                localStorage.setItem(CHECKIN_KEY, JSON.stringify(checkins));
            } catch(e) {}
        }

        function getTodayStr() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function isCheckedInToday() {
            const checkins = loadCheckins();
            const today = getTodayStr();
            return checkins.includes(today);
        }

        function doCheckin() {
            if (isCheckedInToday()) {
                showToast('✅ 今天已经打卡啦！明天再来~');
                return;
            }
            const checkins = loadCheckins();
            checkins.push(getTodayStr());
            saveCheckins(checkins);

            // 自动增加戒烟天数
            const cfg = getConfig();
            cfg.quitDays += 1;
            document.getElementById('cfgQuitDays').value = cfg.quitDays;
            saveData(cfg);

            updateCheckinBtn();
            generateReport();
            showToast('🎉 打卡成功！戒烟天数 +1，身体又恢复了一天！');
        }

        function updateCheckinBtn() {
            const btn = document.getElementById('checkinBtn');
            const icon = document.getElementById('checkinIcon');
            const text = document.getElementById('checkinText');
            if (isCheckedInToday()) {
                btn.classList.add('checked');
                icon.textContent = '✅';
                text.textContent = '今日已打卡';
            } else {
                btn.classList.remove('checked');
                icon.textContent = '👆';
                text.textContent = '点击打卡';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== 配置管理 ==========
        function toggleConfig() {
            const body = document.getElementById('configBody');
            const toggle = document.getElementById('configToggle');
            body.classList.toggle('collapsed');
            toggle.classList.toggle('open');
        }

        function getConfig() {
            return {
                age: parseInt(document.getElementById('cfgAge').value) || 31,
                gender: document.getElementById('cfgGender').value,
                years: parseInt(document.getElementById('cfgYears').value) || 0,
                daily: parseInt(document.getElementById('cfgDaily').value) || 0,
                quitDays: parseInt(document.getElementById('cfgQuitDays').value) || 0,
                cost: parseFloat(document.getElementById('cfgCost').value) || 0,
                disease: document.getElementById('cfgDisease').value
            };
        }

        function setConfig(cfg) {
            document.getElementById('cfgAge').value = cfg.age;
            document.getElementById('cfgGender').value = cfg.gender;
            document.getElementById('cfgYears').value = cfg.years;
            document.getElementById('cfgDaily').value = cfg.daily;
            document.getElementById('cfgQuitDays').value = cfg.quitDays;
            document.getElementById('cfgCost').value = cfg.cost;
            document.getElementById('cfgDisease').value = cfg.disease;
        }

        function resetConfig() {
            setConfig(DEFAULT_CONFIG);
            saveData(DEFAULT_CONFIG);
            generateReport();
            showToast('↩️ 已重置为默认参数');
        }

        function clearAllData() {
            if (!confirm('确定要清除所有保存的数据吗？此操作不可恢复！')) return;
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(CHECKIN_KEY);
            resetConfig();
            showToast('🗑️ 所有数据已清除');
        }

        function saveAndGenerate() {
            const cfg = getConfig();
            saveData(cfg);
            generateReport();
            showToast('💾 参数已保存到本地！');
            // 收起配置面板
            const body = document.getElementById('configBody');
            const toggle = document.getElementById('configToggle');
            body.classList.add('collapsed');
            toggle.classList.add('open');
        }

        // ========== 恢复度计算引擎 ==========
        function calculateRecovery(cfg) {
            const { age, years, daily, quitDays, cost, disease } = cfg;
            const packYears = (years * daily) / 20;
            const totalCigarettes = years * 365 * daily;
            const savings = quitDays * cost;
            const cigarettesSaved = quitDays * daily;

            let diseaseFactor = 1.0;
            let diseaseLabel = '无';
            switch(disease) {
                case 'hypertension': diseaseFactor = 0.85; diseaseLabel = '高血压'; break;
                case 'copd': diseaseFactor = 0.7; diseaseLabel = '慢性支气管炎/COPD'; break;
                case 'asthma': diseaseFactor = 0.8; diseaseLabel = '哮喘'; break;
                case 'diabetes': diseaseFactor = 0.88; diseaseLabel = '糖尿病'; break;
                case 'heart': diseaseFactor = 0.75; diseaseLabel = '心脏病'; break;
            }

            const ageFactor = age <= 30 ? 1.1 : age <= 40 ? 1.0 : age <= 50 ? 0.9 : age <= 60 ? 0.8 : 0.7;

            let intensityLabel, intensityColor;
            if (packYears < 5) { intensityLabel = '轻度'; intensityColor = '#22c55e'; }
            else if (packYears < 15) { intensityLabel = '中度'; intensityColor = '#f59e0b'; }
            else if (packYears < 30) { intensityLabel = '重度'; intensityColor = '#ef4444'; }
            else { intensityLabel = '极重度'; intensityColor = '#dc2626'; }

            function calcLung() {
                let base = Math.min(95, (1 - Math.exp(-quitDays / 90)) * 100);
                let early = Math.min(15, quitDays * 0.5);
                let val = Math.min(95, (base * 0.8 + early) * ageFactor * diseaseFactor);
                return Math.max(0, val);
            }

            function calcCardio() {
                if (quitDays < 1) return 5;
                let val = 0;
                if (quitDays < 7) val = 15 + quitDays * 2;
                else if (quitDays < 30) val = 25 + (quitDays - 7) * 1.5;
                else if (quitDays < 90) val = 55 + (quitDays - 30) * 0.5;
                else if (quitDays < 365) val = 80 + (quitDays - 90) * 0.1;
                else val = 90 + Math.min(10, (quitDays - 365) * 0.02);
                return Math.min(95, val * ageFactor * diseaseFactor);
            }

            function calcBlood() {
                if (quitDays < 0.5) return 10;
                if (quitDays < 1) return 40;
                if (quitDays < 3) return 65 + (quitDays - 1) * 10;
                if (quitDays < 7) return 85 + (quitDays - 3) * 2;
                return Math.min(100, 93 + quitDays * 0.1);
            }

            function calcRespiratory() {
                let base = Math.min(85, quitDays / 270 * 85);
                if (packYears < 5) base *= 1.15;
                return Math.min(90, base * ageFactor * diseaseFactor);
            }

            function calcCancer() {
                let recovery;
                if (quitDays < 365) recovery = 10 + quitDays / 365 * 15;
                else if (quitDays < 365 * 5) recovery = 25 + (quitDays - 365) / (365 * 4) * 25;
                else if (quitDays < 365 * 10) recovery = 50 + (quitDays - 365 * 5) / (365 * 5) * 25;
                else recovery = 75 + Math.min(20, (quitDays - 365 * 10) / (365 * 5) * 20);
                if (packYears < 5) recovery = Math.min(95, recovery * 1.2);
                return Math.min(95, recovery * ageFactor);
            }

            function calcMetabolic() {
                if (quitDays < 3) return 20 + quitDays * 10;
                if (quitDays < 14) return 50 + (quitDays - 3) * 3;
                if (quitDays < 30) return 80 + (quitDays - 14) * 0.5;
                return Math.min(97, 87 + quitDays * 0.05);
            }

            const lung = calcLung();
            const cardio = calcCardio();
            const blood = calcBlood();
            const resp = calcRespiratory();
            const cancer = calcCancer();
            const meta = calcMetabolic();

            const weights = { lung: 0.20, cardio: 0.20, blood: 0.15, resp: 0.15, cancer: 0.15, meta: 0.15 };
            const total = lung * weights.lung + cardio * weights.cardio + blood * weights.blood +
                          resp * weights.resp + cancer * weights.cancer + meta * weights.meta;

            let stage, stageDesc;
            if (quitDays < 3) { stage = '急性戒断期'; stageDesc = '身体正在清除尼古丁，可能出现烦躁、失眠'; }
            else if (quitDays < 14) { stage = '早期恢复期'; stageDesc = '血液循环改善，味觉嗅觉开始恢复'; }
            else if (quitDays < 90) { stage = '快速修复期'; stageDesc = '肺功能显著提升，咳嗽减少，精力改善'; }
            else if (quitDays < 365) { stage = '稳定恢复期'; stageDesc = '心血管风险持续下降，身体稳步修复'; }
            else { stage = '长期康复期'; stageDesc = '癌症风险逐年下降，接近非吸烟者水平'; }

            const futureDays = quitDays + 30;
            const future = {
                lung: (function() {
                    let base = Math.min(95, (1 - Math.exp(-futureDays / 90)) * 100);
                    let early = Math.min(15, futureDays * 0.5);
                    return Math.max(0, Math.min(95, (base * 0.8 + early) * ageFactor * diseaseFactor));
                })(),
                cardio: (function() {
                    let val = 0;
                    if (futureDays < 7) val = 15 + futureDays * 2;
                    else if (futureDays < 30) val = 25 + (futureDays - 7) * 1.5;
                    else if (futureDays < 90) val = 55 + (futureDays - 30) * 0.5;
                    else if (futureDays < 365) val = 80 + (futureDays - 90) * 0.1;
                    else val = 90 + Math.min(10, (futureDays - 365) * 0.02);
                    return Math.min(95, val * ageFactor * diseaseFactor);
                })(),
                blood: (function() {
                    if (futureDays < 0.5) return 10;
                    if (futureDays < 1) return 40;
                    if (futureDays < 3) return 65 + (futureDays - 1) * 10;
                    if (futureDays < 7) return 85 + (futureDays - 3) * 2;
                    return Math.min(100, 93 + futureDays * 0.1);
                })(),
                resp: (function() {
                    let base = Math.min(85, futureDays / 270 * 85);
                    if (packYears < 5) base *= 1.15;
                    return Math.min(90, base * ageFactor * diseaseFactor);
                })(),
                cancer: (function() {
                    let recovery;
                    if (futureDays < 365) recovery = 10 + futureDays / 365 * 15;
                    else if (futureDays < 365 * 5) recovery = 25 + (futureDays - 365) / (365 * 4) * 25;
                    else if (futureDays < 365 * 10) recovery = 50 + (futureDays - 365 * 5) / (365 * 5) * 25;
                    else recovery = 75 + Math.min(20, (futureDays - 365 * 10) / (365 * 5) * 20);
                    if (packYears < 5) recovery = Math.min(95, recovery * 1.2);
                    return Math.min(95, recovery * ageFactor);
                })(),
                meta: (function() {
                    if (futureDays < 3) return 20 + futureDays * 10;
                    if (futureDays < 14) return 50 + (futureDays - 3) * 3;
                    if (futureDays < 30) return 80 + (futureDays - 14) * 0.5;
                    return Math.min(97, 87 + futureDays * 0.05);
                })()
            };

            const futureTotal = future.lung * weights.lung + future.cardio * weights.cardio +
                               future.blood * weights.blood + future.resp * weights.resp +
                               future.cancer * weights.cancer + future.meta * weights.meta;

            return {
                age, gender: cfg.gender, years, daily, totalCigarettes, packYears,
                quitDays, cost, savings, cigarettesSaved,
                intensityLabel, intensityColor, diseaseLabel,
                lung, cardio, blood, resp, cancer, meta, total, stage, stageDesc,
                future, futureTotal, diseaseFactor, ageFactor
            };
        }

        // ========== 渲染函数 ==========
        function renderSavings(data) {
            animateNumber(document.getElementById('savingsNumber'), data.savings, 1500);
            document.getElementById('dailyCost').textContent = `¥${data.cost}`;
            document.getElementById('totalDays').textContent = `${data.quitDays}天`;
            document.getElementById('totalCigarettesSaved').textContent = `${data.cigarettesSaved.toLocaleString()}支`;
        }

        function renderInfoGrid(data) {
            const items = [
                { icon: '👤', value: `${data.age}岁 / ${data.gender}`, label: '年龄性别' },
                { icon: '📅', value: `${data.years}年`, label: '烟龄' },
                { icon: '🚬', value: `${data.daily}支/天`, label: '日均吸烟量' },
                { icon: '📦', value: `${data.packYears.toFixed(1)} 包年`, label: `吸烟强度（${data.intensityLabel}）` },
                { icon: '🔢', value: `${data.totalCigarettes.toLocaleString()}支`, label: '累计吸烟量' },
                { icon: '⏱️', value: `${data.quitDays}天`, label: '已戒烟时长' }
            ];
            if (data.diseaseLabel !== '无') {
                items.push({ icon: '🏥', value: data.diseaseLabel, label: '基础疾病' });
            }
            document.getElementById('infoGrid').innerHTML = items.map(item => `
                <div class="info-item">
                    <div class="icon">${item.icon}</div>
                    <div class="value">${item.value}</div>
                    <div class="label">${item.label}</div>
                </div>
            `).join('');
        }

        function renderSystems(data) {
            const systems = [
                { key: 'blood', name: '血液指标', desc: data.blood > 90 ? '一氧化碳已清除，血氧饱和度恢复正常' : '血液指标持续改善中',
                  icon: '🩸', color: 'green', percent: data.blood },
                { key: 'meta', name: '代谢精力', desc: data.meta > 70 ? '睡眠质量提高，精力充沛' : '代谢系统正在恢复中',
                  icon: '⚡', color: 'cyan', percent: data.meta },
                { key: 'cardio', name: '心血管', desc: data.cardio > 50 ? '血液循环持续改善，心率血压趋于稳定' : '心血管系统开始修复',
                  icon: '❤️', color: 'blue', percent: data.cardio },
                { key: 'lung', name: '肺功能', desc: data.lung > 30 ? '肺功能显著提升，呼吸更顺畅' : '刚开始进入修复期，1个月后将显著提升',
                  icon: '🫁', color: 'orange', percent: data.lung },
                { key: 'resp', name: '呼吸道', desc: '纤毛开始再生，需要1-9个月完全修复',
                  icon: '🫁', color: 'purple', percent: data.resp },
                { key: 'cancer', name: '癌症风险', desc: '长期指标，持续戒烟风险逐年下降',
                  icon: '🛡️', color: 'red', percent: data.cancer }
            ];

            document.getElementById('systemsContainer').innerHTML = systems.map(s => `
                <div class="system-card ${s.color}">
                    <div class="system-icon">${s.icon}</div>
                    <div class="system-info">
                        <div class="system-name">${s.name}</div>
                        <div class="system-desc">${s.desc}</div>
                    </div>
                    <div class="system-progress">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" data-width="${s.percent.toFixed(1)}"></div>
                        </div>
                        <div class="system-percent">${s.percent.toFixed(1)}%</div>
                    </div>
                </div>
            `).join('');
        }

        function renderPrediction(data) {
            const predictions = [
                { name: '综合恢复度', current: data.total, future: data.futureTotal },
                { name: '肺功能', current: data.lung, future: data.future.lung },
                { name: '心血管', current: data.cardio, future: data.future.cardio },
                { name: '代谢精力', current: data.meta, future: data.future.meta }
            ];

            document.getElementById('predictionGrid').innerHTML = predictions.map(p => {
                const gain = p.future - p.current;
                const isMax = gain === Math.max(...predictions.map(x => x.future - x.current));
                return `
                <div class="prediction-item">
                    <div class="prediction-name">${p.name}</div>
                    <div class="prediction-values">
                        <span class="prediction-current">${p.current.toFixed(1)}%</span>
                        <span class="prediction-arrow">→</span>
                        <span class="prediction-future">${p.future.toFixed(1)}%</span>
                    </div>
                    <div class="prediction-gain">▲ +${gain.toFixed(1)}%${isMax ? ' ⚡ 最大提升' : ''}</div>
                </div>
            `}).join('');
        }

        function renderTimeline(data) {
            const milestones = [
                { value: 20, unit: '分钟', desc: '心率血压开始下降' },
                { value: 12, unit: '小时', desc: '血液一氧化碳水平恢复正常' },
                { value: 48, unit: '小时', desc: '神经末梢再生，味觉嗅觉改善' },
                { value: 72, unit: '小时', desc: '体内尼古丁完全清除' },
                { value: 14, unit: '天', desc: '血液循环显著改善' },
                { value: 30, unit: '天', desc: '肺功能提升约30%，咳嗽减少' },
                { value: 90, unit: '天', desc: '呼吸道纤毛大量再生，感染抵抗力增强' },
                { value: 365, unit: '年', desc: '冠心病风险降低50%' },
                { value: 5, unit: '年', desc: '中风风险降至非吸烟者水平' },
                { value: 10, unit: '年', desc: '肺癌死亡风险降低50%' },
                { value: 15, unit: '年', desc: '冠心病风险接近非吸烟者水平' }
            ];

            let currentPassed = false;
            document.getElementById('timelineContainer').innerHTML = milestones.map((m, i) => {
                let days;
                if (m.unit === '分钟') days = m.value / (24 * 60);
                else if (m.unit === '小时') days = m.value / 24;
                else if (m.unit === '天') days = m.value;
                else if (m.unit === '年') days = m.value * 365;
                else days = m.value;

                let status;
                if (data.quitDays >= days) {
                    status = 'done';
                    if (i < milestones.length - 1) {
                        const next = milestones[i + 1];
                        let nextDays;
                        if (next.unit === '分钟') nextDays = next.value / (24 * 60);
                        else if (next.unit === '小时') nextDays = next.value / 24;
                        else if (next.unit === '天') nextDays = next.value;
                        else if (next.unit === '年') nextDays = next.value * 365;
                        else nextDays = next.value;
                        if (data.quitDays < nextDays) status = 'done current';
                    }
                } else if (!currentPassed) {
                    status = 'upcoming';
                    currentPassed = true;
                } else {
                    status = 'pending';
                }

                const badge = status === 'done' ? '已达成' :
                               status.includes('current') ? '当前位置' :
                               status === 'upcoming' ? '即将到来' : '未达成';

                return `
                <div class="timeline-item ${status.replace(' current', '')}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-time">${m.value}${m.unit} <span class="timeline-badge">${badge}</span></div>
                    <div class="timeline-desc">${m.desc}</div>
                </div>
            `}).join('');
        }

        function renderTips(data) {
            const tips = [];
            const { quitDays, packYears, diseaseFactor, age, cost } = data;

            if (quitDays < 30) {
                tips.push({
                    title: '抓住第14-30天窗口期',
                    desc: '肺功能正在快速修复，这是身体回报最明显的阶段。坚持住，1个月后你会明显感觉呼吸更顺畅。'
                });
            }

            if (packYears < 5) {
                tips.push({
                    title: '你是轻度吸烟者，恢复优势明显',
                    desc: `你的${packYears.toFixed(1)}包年属于轻度损伤，身体修复速度比重度吸烟者快30%以上。年轻+轻度=最佳恢复组合。`
                });
            }

            tips.push({
                title: '开始适度有氧运动',
                desc: '快走或慢跑能加速肺部和心血管恢复。戒烟后运动耐受性会快速提升，这是感受恢复的最佳方式。'
            });

            if (quitDays < 30) {
                tips.push({
                    title: '警惕"就一口"陷阱',
                    desc: '2-4周是复吸高发期，戒断症状减轻容易让人放松警惕。记住：一口烟就能让多巴胺回路重启。'
                });
            }

            if (data.diseaseLabel !== '无') {
                tips.push({
                    title: `注意${data.diseaseLabel}管理`,
                    desc: `你有${data.diseaseLabel}，恢复速度会略慢于健康人群。建议定期复查，将戒烟与疾病管理结合。`
                });
            }

            tips.push({
                title: `已节省 ¥${data.savings.toFixed(0)}，奖励自己`,
                desc: `每天省¥${cost}，${quitDays}天已省¥${data.savings.toFixed(0)}。用这笔钱买件想要的东西，让戒烟有实实在在的回报！`
            });

            document.getElementById('tipsGrid').innerHTML = tips.map((tip, i) => `
                <div class="tip-card">
                    <div class="tip-number">${i + 1}</div>
                    <div class="tip-title">${tip.title}</div>
                    <div class="tip-desc">${tip.desc}</div>
                </div>
            `).join('');
        }

        // ========== 动画 ==========
        function animateNumber(element, target, duration = 2000) {
            const startVal = parseFloat(element.textContent.replace(/,/g, '')) || 0;
            const diff = target - startVal;
            let start = null;
            function step(timestamp) {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                const current = startVal + diff * ease;
                element.textContent = current.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function animateCircle(target) {
            const circle = document.getElementById('progressCircle');
            const circumference = 2 * Math.PI * 90;
            const offset = circumference - (target / 100) * circumference;
            setTimeout(() => { circle.style.strokeDashoffset = offset; }, 300);
        }

        function animateBars() {
            const bars = document.querySelectorAll('.progress-bar-fill');
            bars.forEach((bar, index) => {
                const width = bar.getAttribute('data-width');
                setTimeout(() => { bar.style.width = width + '%'; }, 500 + index * 100);
            });
        }

        // ========== 主生成函数 ==========
        function generateReport() {
            const cfg = getConfig();
            const data = calculateRecovery(cfg);

            document.getElementById('stageBadge').textContent = `📍 ${data.stage}（戒烟第${data.quitDays}天）`;

            renderSavings(data);
            renderInfoGrid(data);
            renderSystems(data);
            renderPrediction(data);
            renderTimeline(data);
            renderTips(data);

            const encourage = data.total < 30 ? '刚开始，你已经迈出了最重要的一步！' :
                             data.total < 50 ? '恢复加速中，坚持就是胜利！' :
                             data.total < 70 ? '你的身体正在感谢你，继续加油！' :
                             data.total < 85 ? '大部分系统已恢复，保持这个势头！' :
                             '你几乎完全恢复了，太棒了！';
            document.getElementById('footerEncourage').textContent = `💪 ${encourage}`;

            animateNumber(document.getElementById('recoveryNumber'), data.total);
            animateCircle(data.total);
            setTimeout(animateBars, 100);
        }

        // ========== 初始化 ==========
        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                p.style.opacity = 0.1 + Math.random() * 0.3;
                container.appendChild(p);
            }
        }

        function init() {
            initParticles();

            // 加载保存的数据
            const saved = loadData();
            if (saved) {
                setConfig(saved);
            }

            updateCheckinBtn();
            generateReport();

            // 默认收起配置面板
            const body = document.getElementById('configBody');
            const toggle = document.getElementById('configToggle');
            body.classList.add('collapsed');
            toggle.classList.add('open');
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
